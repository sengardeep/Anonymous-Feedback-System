<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Feedback | Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="glass-panel" id="auth-panel">
        <div class="tabs">
            <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <div id="login-section" class="form-section">
            <h2>Welcome Back</h2>
            <p class="subtitle">Log in to manage your feedback forms</p>
            <div class="input-group">
                <input type="email" placeholder="Email address" id="loginMail">
            </div>
            <div class="input-group">
                <input type="password" placeholder="Password" id="loginPassword">
            </div>
            <button class="primary-btn" onclick="login()" id="loginBtn">Login</button>
        </div>

        <div id="signup-section" class="form-section hidden">
            <h2>Create Account</h2>
            <p class="subtitle">Start receiving anonymous feedback today</p>
            <div class="input-group">
                <input type="email" placeholder="Email address" id="signupMail">
            </div>
            <div class="input-group">
                <input type="password" placeholder="Password (min 6 chars)" id="signupPassword">
            </div>
            <button class="primary-btn" onclick="signup()" id="signupBtn">Sign Up</button>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>

    <script>
        // Check if already logged in natively
        document.addEventListener("DOMContentLoaded", () => {
            if(localStorage.getItem("token")) {
                window.location.href = "create.html";
            }
        });
    </script>
</body>
</html>
