<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Anonymous Feedback</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="glass-panel" id="feedback-panel">
        <div class="form-header">
            <div class="avatar-placeholder">👤</div>
            <h2 id="title">Loading...</h2>
            <p class="subtitle">Send a completely anonymous message</p>
        </div>
        
        <div class="input-group">
            <textarea id="message" placeholder="Type your honest feedback here..."></textarea>
        </div>
        <button class="primary-btn" onclick="submitFeedback()" id="submitBtn">Send Anonymously</button>
    </div>

    <div class="glass-panel hidden success-state" id="success-state">
        <div class="success-icon">✨</div>
        <h3>Message Sent!</h3>
        <p class="subtitle" style="margin-bottom: 24px;">Your feedback was delivered anonymously.</p>
        <button class="secondary-btn" onclick="location.reload()">Send Another</button>
    </div>
    
    <div id="toast" class="toast"></div>
</body>
</html>
